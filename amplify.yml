version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Using Node version"
        - node -v
        - npm -v
        - npm ci --prefer-offline --no-audit --progress=false
    build:
      commands:
        - echo "Building the Vite app"
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**

# Redirects / Rewrites for single-page-app routing (Amplify Console)
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Cache-Control'
        value: 'max-age=0, no-cache, no-store, must-revalidate'

# Use Amplify Console redirects section to ensure SPA routes go to index.html
rewrites:
  - source: '/<*> '
    target: '/index.html'
    status: '200'
