AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Unify Payment Integration Stack
  Deploys Razorpay payment processing Lambda functions, DynamoDB table,
  S3 receipt bucket, and Secrets Manager secret. 
  Does NOT modify any existing Unify resources.

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  FrontendOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin. Defaults to wildcard so custom domains, local dev, and API Gateway origins are all accepted.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  CognitoUserPoolId:
    Type: String
    Default: ap-south-1_ueutDQExM
    Description: Cognito User Pool ID for adding chapter heads to group

  CognitoUserPoolAppClientId:
    Type: String
    Default: 6uac5t9b0oub9b1cjoot94uplc
    Description: App Client ID for the JWT Authorizer

  RazorpayKeyId:
    Type: String
    Description: Razorpay Key ID (stored in Secrets Manager)

  RazorpayKeySecret:
    Type: String
    NoEcho: true
    Description: Razorpay Key Secret (stored securely in Secrets Manager)

# ─────────────────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [x86_64]
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        PAYMENTS_TABLE: !Ref ChapterPaymentsTable
        CHAPTERS_TABLE: Chapters
        USERS_TABLE: Unify-Users
        REGISTRATION_TABLE: RegistrationRequests
        RECEIPTS_BUCKET: !Ref UnifyPaymentReceiptsBucket
        EVENTS_TABLE: !Ref ChapterEventsTable
        EVENT_PAYMENTS_TABLE: !Ref EventPaymentsTable
        CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
        CHAT_THREADS_TABLE: !Ref ChatThreadsTable
        RAZORPAY_SECRET_NAME: unify/razorpay/credentials
        RAZORPAY_KEY_ID: !Ref RazorpayKeyId
        USER_POOL_ID: !Ref CognitoUserPoolId
        ALLOWED_ORIGIN: "*"
        ENVIRONMENT: !Ref Environment

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ──────────────────────────────────────────────────────────────────────────
  # HTTP API Gateway (new, separate from existing Unify API)
  # ──────────────────────────────────────────────────────────────────────────
  PaymentHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: Unify Payment API - handles Razorpay payment flows
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        MaxAge: 600
      Auth:
        Authorizers:
          CognitoAuth:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"
              audience:
                - !Ref CognitoUserPoolAppClientId
            IdentitySource: "$request.header.Authorization"
      Tags:
        Application: Unify
        Component: Payment
        Environment: !Ref Environment

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — ChapterPayments Table (NEW TABLE — does not touch existing tables)
  # ──────────────────────────────────────────────────────────────────────────
  ChapterPaymentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: ChapterPayments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chapterId
          AttributeType: S
        - AttributeName: transactionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: paymentStatus
          AttributeType: S
        - AttributeName: recordType
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: chapterId
          KeyType: HASH
        - AttributeName: transactionId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PaymentStatusIndex
          KeySchema:
            - AttributeName: paymentStatus
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: RecordTypeIndex
          KeySchema:
            - AttributeName: recordType
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — EventRegistrationRequests Table (NEW)
  # ──────────────────────────────────────────────────────────────────────────
  EventRegistrationRequestsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: EventRegistrationRequests
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: registrationId
          AttributeType: S
        - AttributeName: chapterId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: registrationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ChapterIdIndex
          KeySchema:
            - AttributeName: chapterId
              KeyType: HASH
            - AttributeName: registrationId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: EventIdIndex
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: registrationId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: registrationId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: EventRegistration

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — ChapterEvents Table
  # ──────────────────────────────────────────────────────────────────────────
  ChapterEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: ChapterEvents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chapterId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: eventType
          AttributeType: S
        - AttributeName: startDateTime
          AttributeType: S
      KeySchema:
        - AttributeName: chapterId
          KeyType: HASH
        - AttributeName: eventId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: EventIdIndex
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: EventTypeIndex
          KeySchema:
            - AttributeName: eventType
              KeyType: HASH
            - AttributeName: startDateTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Events

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — ChapterProfiles Table (new for Know More About It)
  # ──────────────────────────────────────────────────────────────────────────
  ChapterProfilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: ChapterProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chapterId
          AttributeType: S
      KeySchema:
        - AttributeName: chapterId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: ChapterProfiles

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — EventProfiles Table (new for Event Know More About It)
  # ──────────────────────────────────────────────────────────────────────────
  EventProfilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: EventProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: EventProfiles
  # Tracks event registrations and payment status
  # ──────────────────────────────────────────────────────────────────────────
  EventPaymentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: EventPayments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: paymentStatus
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PaymentStatusIndex
          KeySchema:
            - AttributeName: paymentStatus
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Events

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — ChatThreads Table
  # Stores conversation metadata between Chapter Head and Students
  # ──────────────────────────────────────────────────────────────────────────
  ChatThreadsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: ChatThreads1To1
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S
        - AttributeName: chapterId
          AttributeType: S
        - AttributeName: lastMessageAt
          AttributeType: S
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ChapterThreadsIndex
          KeySchema:
            - AttributeName: chapterId
              KeyType: HASH
            - AttributeName: lastMessageAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Chat

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — ChatMessages Table
  # Stores individual chat messages with full conversation history
  # ──────────────────────────────────────────────────────────────────────────
  ChatMessagesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: ChatMessages1To1
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversationId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: senderId
          AttributeType: S
      KeySchema:
        - AttributeName: conversationId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ConversationTimeIndex
          KeySchema:
            - AttributeName: conversationId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: SenderIdIndex
          KeySchema:
            - AttributeName: senderId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Chat

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — Certificates Table (NEW)
  # Tracks which students have been issued which certificates for which events
  # ──────────────────────────────────────────────────────────────────────────
  CertificatesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: Certificates
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: eventId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Certificates

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — Wallet Table
  # Stores student reward points balance
  # ──────────────────────────────────────────────────────────────────────────
  WalletTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: Wallet
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Wallet

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — WalletTransactions Table
  # History of credits (certificates) and debits (payments)
  # ──────────────────────────────────────────────────────────────────────────
  WalletTransactionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: WalletTransactions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: transactionId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: transactionId
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Wallet

  # ──────────────────────────────────────────────────────────────────────────
  # S3 Bucket — Payment Receipts
  # ──────────────────────────────────────────────────────────────────────────
  UnifyPaymentReceiptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub unify-payment-receipts-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldReceipts
            Status: Enabled
            ExpirationInDays: 365
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Payment

  ReceiptsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UnifyPaymentReceiptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action:
              - s3:GetObject
            Effect: Allow
            Resource: !Sub "arn:aws:s3:::${UnifyPaymentReceiptsBucket}/receipts/*"
            Principal: "*"

  # ──────────────────────────────────────────────────────────────────────────
  # S3 Bucket — Chapter Profile Images
  # ──────────────────────────────────────────────────────────────────────────
  UnifyChapterImagesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub unify-chapter-profile-images-${Environment}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - "*"
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: ChapterProfile

  ChapterImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UnifyChapterImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action:
              - s3:GetObject
            Effect: Allow
            Resource: !Sub "arn:aws:s3:::${UnifyChapterImagesBucket}/*"
            Principal: "*"

  # ──────────────────────────────────────────────────────────────────────────
  # Secrets Manager — Razorpay Credentials
  # ──────────────────────────────────────────────────────────────────────────
  RazorpayCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: unify/razorpay/credentials
      Description: Razorpay API credentials for Unify payment processing
      SecretString: !Sub |
        {
          "key_id": "${RazorpayKeyId}",
          "key_secret": "${RazorpayKeySecret}"
        }
      Tags:
        - Key: Application
          Value: Unify
        - Key: Component
          Value: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # IAM Shared Policy for SecretsManager (attached per-function)
  # ──────────────────────────────────────────────────────────────────────────
  SecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allow payment Lambdas to read Razorpay credentials from Secrets Manager
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !Ref RazorpayCredentialsSecret

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 1: Create Chapter With Payment Configuration
  # Admin creates a chapter and optionally sets a registration fee
  # POST /api/chapters/create-with-payment
  # ──────────────────────────────────────────────────────────────────────────
  CreateChapterWithPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-create-chapter-with-payment-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/createChapterWithPayment-payment/
      Description: Creates a chapter and stores payment configuration in ChapterPayments table
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: Chapters
        - DynamoDBCrudPolicy:
            TableName: ChapterHead
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminAddUserToGroup
            Resource: !Sub arn:aws:cognito-idp:ap-south-1:${AWS::AccountId}:userpool/${CognitoUserPoolId}
      Events:
        CreateChapterWithPaymentApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/create-with-payment
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        CreateChapterWithPaymentOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/create-with-payment
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 2: Create Razorpay Order
  # Student initiates payment — creates Razorpay order + PENDING transaction
  # POST /api/payments/create-order
  # ──────────────────────────────────────────────────────────────────────────
  CreateRazorpayOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-create-razorpay-order-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/createRazorpayOrder-payment/
      Description: Creates Razorpay payment order for chapter registration
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBReadPolicy:
            TableName: Chapters
        - !Ref SecretsManagerPolicy
      Events:
        CreateRazorpayOrderApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/create-order
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        CreateRazorpayOrderOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/create-order
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 3: Verify Payment
  # Verifies Razorpay signature, uploads receipt to S3, marks COMPLETED
  # POST /api/payments/verify
  # ──────────────────────────────────────────────────────────────────────────
  VerifyPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-verify-payment-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/verifyPayment-payment/
      Description: Verifies Razorpay payment signature and generates receipt
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: RegistrationRequests
        - DynamoDBCrudPolicy:
            TableName: Unify-Users
        - S3CrudPolicy:
            BucketName: !Ref UnifyPaymentReceiptsBucket
        - !Ref SecretsManagerPolicy
      Events:
        VerifyPaymentApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/verify
            Method: POST
        VerifyPaymentOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/verify
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 4: Complete Payment Registration
  # Auto-approves registration + updates user profile after payment
  # POST /api/payments/complete-registration
  # ──────────────────────────────────────────────────────────────────────────
  CompletePaymentRegistrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-complete-payment-registration-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/completePaymentRegistration-payment/
      Description: Completes chapter registration after successful payment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: RegistrationRequests
        - DynamoDBCrudPolicy:
            TableName: Unify-Users
        - DynamoDBCrudPolicy:
            TableName: Chapters
        - DynamoDBCrudPolicy:
            TableName: Activities
      Events:
        CompletePaymentRegistrationApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/complete-registration
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        CompletePaymentRegistrationOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/complete-registration
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 5: Get Chapter Fees
  # Returns fee configuration for a chapter (public endpoint, no auth)
  # GET /api/chapters/{chapterId}/fees
  # ──────────────────────────────────────────────────────────────────────────
  GetChapterFeesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-get-chapter-fees-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/getChapterFees-payment/
      Description: Returns fee configuration for a chapter
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBReadPolicy:
            TableName: Chapters
      Events:
        GetChapterFeesApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/fees
            Method: GET
        GetChapterFeesOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/fees
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 6: Edit Chapter Payment Configuration
  # Updates chapter's free/paid status (Admin only)
  # PUT /api/chapters/{chapterId}/payment-config
  # ──────────────────────────────────────────────────────────────────────────
  EditChapterPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-edit-chapter-payment-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/editChapterPayment-payment/
      Description: Update fee configuration for an existing chapter
      Timeout: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: Chapters
      Events:
        EditChapterPaymentApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/payment-config
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
        EditChapterPaymentOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/payment-config
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda X: Chapter Profile API
  # GET /api/chapters/{chapterId}/profile (public read)
  # PUT /api/chapterhead/chapters/{chapterId}/profile (chapter-head edit)
  # ──────────────────────────────────────────────────────────────────────────
  ChapterProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-chapter-profile-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/chapterProfile-payment/
      Description: Manage read/write chapter profile content for “Know More About It”
      Timeout: 15
      Environment:
        Variables:
          IMAGES_BUCKET: !Ref UnifyChapterImagesBucket
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChapterProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterProfilesTable
        - DynamoDBReadPolicy:
            TableName: Chapters
        - DynamoDBReadPolicy:
            TableName: ChapterHead
        - S3CrudPolicy:
            BucketName: !Ref UnifyChapterImagesBucket
      Events:
        GetChapterProfileApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/profile
            Method: GET
        GetChapterProfileOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/profile
            Method: OPTIONS
        UpdateChapterProfileApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/chapters/{chapterId}/profile
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
        UpdateChapterProfileOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/chapters/{chapterId}/profile
            Method: OPTIONS
        GetUploadUrlApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/chapters/{chapterId}/profile/upload-url
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        GetUploadUrlOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/chapters/{chapterId}/profile/upload-url
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: ChapterProfile

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda X: Event Profile API
  # GET /api/events/{eventId}/profile (public read)
  # PUT /api/chapterhead/events/{eventId}/profile (chapter-head edit)
  # ──────────────────────────────────────────────────────────────────────────
  EventProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-event-profile-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/eventProfile-payment/
      Description: Manage read/write event profile content for "Know More About It"
      Timeout: 15
      Environment:
        Variables:
          IMAGES_BUCKET: !Ref UnifyChapterImagesBucket
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventProfilesTable
        - DynamoDBReadPolicy:
            TableName: ChapterEvents
        - DynamoDBReadPolicy:
            TableName: ChapterHead
        - S3CrudPolicy:
            BucketName: !Ref UnifyChapterImagesBucket
      Events:
        GetEventProfileApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/{eventId}/profile
            Method: GET
        GetEventProfileOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/{eventId}/profile
            Method: OPTIONS
        UpdateEventProfileApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/events/{eventId}/profile
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
        UpdateEventProfileOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/events/{eventId}/profile
            Method: OPTIONS
        GetEventUploadUrlApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/events/{eventId}/profile/upload-url
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        GetEventUploadUrlOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/events/{eventId}/profile/upload-url
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: EventProfile

  # ──────────────────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Manage Event Registrations API
  # GET /api/chapterhead/event-registrations
  # PUT /api/chapterhead/event-registration/{registrationId}
  # ──────────────────────────────────────────────────────────────────────────
  ManageEventRegistrationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-manage-event-registrations-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/manage-event-registrations/
      Description: Handle listing and approval of event registration requests
      Timeout: 15
      Environment:
        Variables:
          EVENT_REG_TABLE: !Ref EventRegistrationRequestsTable
          USERS_TABLE: Unify-Users
          CHAPTERS_TABLE: Chapters
          EVENTS_TABLE: !Ref ChapterEventsTable
          ACTIVITIES_TABLE: Activities
          CHAPTER_HEAD_TABLE: ChapterHead
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventRegistrationRequestsTable
        - DynamoDBCrudPolicy:
            TableName: Unify-Users
        - DynamoDBReadPolicy:
            TableName: Chapters
        - DynamoDBCrudPolicy:
            TableName: Chapters
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBCrudPolicy:
            TableName: Activities
        - DynamoDBReadPolicy:
            TableName: ChapterHead
      Events:
        GetEventRegistrationsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/event-registrations
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        GetEventRegistrationsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/event-registrations
            Method: OPTIONS
        UpdateEventRegistrationApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/event-registration/{registrationId}
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
        UpdateEventRegistrationOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/event-registration/{registrationId}
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: EventRegistration

  # Lambda 6: Get Payment Details
  # Returns payment history for a user or chapter (requires auth)
  # GET /api/payments/details
  # ──────────────────────────────────────────────────────────────────────────
  GetPaymentDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-get-payment-details-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/getPaymentDetails-payment/
      Description: Returns payment history for user or chapter
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref EventPaymentsTable
        - S3ReadPolicy:
            BucketName: !Ref UnifyPaymentReceiptsBucket
      Events:
        GetPaymentDetailsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/details
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        GetPaymentDetailsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/payments/details
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Payment

# ─────────────────────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 7: Create Event
  # Chapter Head creates a new event
  # POST /api/events
  # ──────────────────────────────────────────────────────────────────────────
  CreateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-create-event-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/createEvent-payment/
      Description: Creates a new event for a chapter
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBReadPolicy:
            TableName: Chapters
        - DynamoDBCrudPolicy:
            TableName: Activities
      Events:
        CreateEventApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events
            Method: POST
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 12: Update Event
  # Chapter Head updates an existing event
  # PUT /api/events/{chapterId}/{eventId}
  # ──────────────────────────────────────────────────────────────────────────
  UpdateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-update-event-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/updateEvent-payment/
      Description: Updates an existing chapter event
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBCrudPolicy:
            TableName: Activities
      Events:
        UpdateEventApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/{chapterId}/{eventId}
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 13: Delete Event
  # Chapter Head deletes an existing event (soft delete)
  # DELETE /api/events/{chapterId}/{eventId}
  # ──────────────────────────────────────────────────────────────────────────
  DeleteEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-delete-event-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/deleteEvent-payment/
      Description: Deletes an existing chapter event (marks as not live)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBCrudPolicy:
            TableName: Activities
      Events:
        DeleteEventApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/{chapterId}/{eventId}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 14: List Chapter Events
  # Returns all events for a specific chapter
  # GET /api/chapter-events/{chapterId}
  # ──────────────────────────────────────────────────────────────────────────
  ListChapterEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-chapter-events-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/listChapterEvents-payment/
      Description: Returns all events for a specific chapter
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChapterEventsTable
      Events:
        ListChapterEventsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapter-events/{chapterId}
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 8: List Events
  # Returns live events only for the authenticated student's registered chapters
  # GET /api/events
  # ──────────────────────────────────────────────────────────────────────────
  ListEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-events-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/listEvents-payment/
      Description: Lists all live events
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBReadPolicy:
            TableName: Unify-Users
      Events:
        ListEventsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 9: Join Free Event
  # Student joins a free event
  # POST /api/events/join
  # ──────────────────────────────────────────────────────────────────────────
  JoinFreeEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-join-free-event-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/joinFreeEvent-payment/
      Description: Student joins a free chapter event
      Environment:
        Variables:
          EVENT_PAYMENTS_TABLE: !Ref EventPaymentsTable
          EVENT_REG_TABLE: !Ref EventRegistrationRequestsTable
          EVENTS_TABLE: !Ref ChapterEventsTable
          USERS_TABLE: Unify-Users
          ACTIVITIES_TABLE: Activities
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventRegistrationRequestsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBCrudPolicy:
            TableName: Activities
        - DynamoDBCrudPolicy:
            TableName: Unify-Users
      Events:
        JoinFreeEventApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/join
            Method: POST
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 10: Create Event Razorpay Order
  # Student initiates payment for a paid event
  # POST /api/events/create-order
  # ──────────────────────────────────────────────────────────────────────────
  CreateEventOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-create-event-order-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/createEventOrder-payment/
      Description: Creates Razorpay order for a paid event registration
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - !Ref SecretsManagerPolicy
      Events:
        CreateEventOrderApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/create-order
            Method: POST
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 11: Verify Event Payment
  # Verifies Razorpay signature and finalizes event registration
  # POST /api/events/verify
  # ──────────────────────────────────────────────────────────────────────────
  VerifyEventPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-verify-event-payment-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/verifyEventPayment-payment/
      Description: Verifies Razorpay payment and completes event registration
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBCrudPolicy:
            TableName: Activities
        - DynamoDBCrudPolicy:
            TableName: Unify-Users
        - S3CrudPolicy:
            BucketName: !Ref UnifyPaymentReceiptsBucket
        - !Ref SecretsManagerPolicy
      Events:
        VerifyEventPaymentApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/verify
            Method: POST
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda 12: List Student Event Registrations
  # Returns all events a student has registered for
  # GET /api/events/my-registrations
  # ──────────────────────────────────────────────────────────────────────────
  ListStudentEventRegistrationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-my-event-registrations-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/listStudentEventRegistrations-payment/
      Description: Returns all events a student has registered for
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventPaymentsTable
      Events:
        ListMyEventRegistrationsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/my-registrations
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: List Event Registrations For Event (Chapter Head)
  # Returns all registrations for a given event
  # GET /api/events/registrations?eventId=xxx
  # ──────────────────────────────────────────────────────────────────────────
  ListEventRegistrationsForEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-event-registrations-for-event-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/listEventRegistrationsForEvent-payment/
      Description: Returns all registrations for a given event (chapter head view)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventPaymentsTable
        - DynamoDBReadPolicy:
            TableName: Unify-Users
      Events:
        ListEventRegistrationsForEventApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/events/registrations
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Events

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Send Chat Message
  # Chapter head or student sends a message to the other party
  # POST /api/chat/send-message
  # ──────────────────────────────────────────────────────────────────────────
  SendChatMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-send-chat-message-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/sendChatMessage-payment/
      Description: Sends chat message between chapter head and students
      Environment:
        Variables:
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          CHAT_THREADS_TABLE: !Ref ChatThreadsTable
          CHAPTERS_TABLE: Chapters
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatMessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatThreadsTable
        - DynamoDBReadPolicy:
            TableName: Chapters
      Events:
        SendChatMessageApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chat/send-message
            Method: POST
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Chat

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Get Chat Messages
  # Retrieve conversation history between two users
  # GET /api/chat/messages
  # ──────────────────────────────────────────────────────────────────────────
  GetChatMessagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-get-chat-messages-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/getChatMessages-payment/
      Description: Retrieves chat message history
      Environment:
        Variables:
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          CHAT_THREADS_TABLE: !Ref ChatThreadsTable
          CHAPTERS_TABLE: Chapters
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatMessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatThreadsTable
        - DynamoDBReadPolicy:
            TableName: Chapters
      Events:
        GetChatMessagesApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chat/messages
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Chat

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: List Chat Conversations
  # List all conversations for a user in a chapter
  # GET /api/chat/conversations
  # ──────────────────────────────────────────────────────────────────────────
  ListChatConversationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-chat-conversations-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/listChatConversations-payment/
      Description: Lists all chat conversations for a user in a chapter
      Environment:
        Variables:
          CHAT_THREADS_TABLE: !Ref ChatThreadsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          CHAPTERS_TABLE: Chapters
          USERS_TABLE: Unify-Users
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChatThreadsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ChatMessagesTable
        - DynamoDBReadPolicy:
            TableName: Chapters
        - DynamoDBReadPolicy:
            TableName: Unify-Users
      Events:
        ListChatConversationsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chat/conversations
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Chat

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Admin Payment Transparency
  # Detailed chapter/event payment transparency for admin dashboard
  # GET /api/admin/payments/transparency?chapterId=xxx
  # ──────────────────────────────────────────────────────────────────────────
  AdminPaymentTransparencyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-admin-payment-transparency-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/adminPaymentTransparency-payment/
      Description: Returns chapter event payment transparency details for admin
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          CHAPTERS_TABLE: Chapters
          EVENTS_TABLE: !Ref ChapterEventsTable
          EVENT_PAYMENTS_TABLE: !Ref EventPaymentsTable
          USERS_TABLE: Unify-Users
          REGISTRATION_TABLE: RegistrationRequests
          RAZORPAY_SECRET_NAME: unify/razorpay/credentials
      Policies:
        - DynamoDBReadPolicy:
            TableName: Chapters
        - DynamoDBReadPolicy:
            TableName: ChapterPayments
        - DynamoDBReadPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref EventPaymentsTable
        - DynamoDBReadPolicy:
            TableName: Unify-Users
        - DynamoDBReadPolicy:
            TableName: RegistrationRequests
        - !Ref SecretsManagerPolicy
      Events:
        AdminPaymentTransparencyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/admin/payments/transparency
            Method: GET
      Tags:
        Application: Unify
        Component: Payment

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Google OAuth Init
  # GET /api/google/oauth/init
  # ──────────────────────────────────────────────────────────────────────────
  GoogleOAuthInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-google-oauth-init-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/google-oauth-init/
      Environment:
        Variables:
          TOKENS_TABLE: GoogleOAuthTokens
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:UpdateItem", "dynamodb:DeleteItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GoogleOAuthTokens"
      Events:
        InitApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/google/oauth/init
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: CalendarIntegration

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Google OAuth Callback
  # GET /api/google/oauth/callback
  # ──────────────────────────────────────────────────────────────────────────
  GoogleOAuthCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-google-oauth-callback-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/google-oauth-callback/
      Environment:
        Variables:
          TOKENS_TABLE: GoogleOAuthTokens
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:UpdateItem", "dynamodb:DeleteItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GoogleOAuthTokens"
      Events:
        CallbackApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/google/oauth/callback
            Method: GET
      Tags:
        Application: Unify
        Component: CalendarIntegration

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: List Notifications
  # GET /api/notifications
  # ──────────────────────────────────────────────────────────────────────────
  ListNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-notifications-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/list-notifications/
      Environment:
        Variables:
          NOTIFICATIONS_TABLE: UnifyNotifications
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: 
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications/index/*"
      Events:
        ListApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/notifications
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Notifications

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Mark Notification Read
  # PUT /api/notifications/{notificationId}/read
  # ──────────────────────────────────────────────────────────────────────────
  MarkNotificationReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-mark-notification-read-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/mark-notification-read/
      Environment:
        Variables:
          NOTIFICATIONS_TABLE: UnifyNotifications
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:UpdateItem", "dynamodb:DeleteItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: 
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications/index/*"
      Events:
        ReadApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/notifications/{notificationId}/read
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
        ReadAllApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/notifications/all/read
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Notifications

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Create Chapter Meeting
  # POST /api/chapterhead/meetings
  # ──────────────────────────────────────────────────────────────────────────
  CreateChapterMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-create-chapter-meeting-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/create-chapter-meeting/
      Environment:
        Variables:
          NOTIFICATIONS_TABLE: UnifyNotifications
          TOKENS_TABLE: GoogleOAuthTokens
          REGISTRATION_TABLE: RegistrationRequests
          EVENT_REG_TABLE: !Ref EventRegistrationRequestsTable
          USERS_TABLE: Unify-Users
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:UpdateItem", "dynamodb:DeleteItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: 
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications/index/*"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GoogleOAuthTokens"
        - DynamoDBReadPolicy:
            TableName: RegistrationRequests
        - DynamoDBReadPolicy:
            TableName: !Ref EventRegistrationRequestsTable
        - DynamoDBReadPolicy:
            TableName: Unify-Users
      Events:
        CreateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapterhead/meetings
            Method: POST
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: CalendarIntegration

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: List Chapter Meetings
  # GET /api/chapters/{chapterId}/meetings
  # ──────────────────────────────────────────────────────────────────────────
  ListChapterMeetingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-list-chapter-meetings-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/list-chapter-meetings/
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:Query", "dynamodb:Scan", "dynamodb:GetItem" ]
              Resource: 
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ChapterMeetings"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ChapterMeetings/index/*"
      Events:
        ListMeetingsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/meetings
            Method: GET
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: CalendarIntegration

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Update Chapter Meeting
  # PATCH /api/chapters/{chapterId}/meetings/{meetingId}
  # ──────────────────────────────────────────────────────────────────────────
  UpdateChapterMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-update-chapter-meeting-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/update-chapter-meeting/
      Environment:
        Variables:
          NOTIFICATIONS_TABLE: UnifyNotifications
          TOKENS_TABLE: GoogleOAuthTokens
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:UpdateItem", "dynamodb:DeleteItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: 
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GoogleOAuthTokens"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ChapterMeetings"
      Events:
        UpdateMeetingApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/meetings/{meetingId}
            Method: PATCH
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: CalendarIntegration

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Delete Chapter Meeting
  # DELETE /api/chapters/{chapterId}/meetings/{meetingId}
  # ──────────────────────────────────────────────────────────────────────────
  DeleteChapterMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-delete-chapter-meeting-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/delete-chapter-meeting/
      Environment:
        Variables:
          NOTIFICATIONS_TABLE: UnifyNotifications
          TOKENS_TABLE: GoogleOAuthTokens
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:UpdateItem", "dynamodb:DeleteItem", "dynamodb:Query", "dynamodb:Scan" ]
              Resource: 
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UnifyNotifications"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/GoogleOAuthTokens"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ChapterMeetings"
      Events:
        DeleteMeetingApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/chapters/{chapterId}/meetings/{meetingId}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: CalendarIntegration

  # ──────────────────────────────────────────────────────────────────────────
  # DynamoDB — WebSocket Connections Table
  # ──────────────────────────────────────────────────────────────────────────
  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WebSocketConnections1To1
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL



  # ──────────────────────────────────────────────────────────────────────────
  # WebSocket API Gateway
  # ──────────────────────────────────────────────────────────────────────────
  ChapterChatWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ChapterChatWebSocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  # Routes
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      RouteKey: "$connect"
      AuthorizationType: NONE
      Target: !Join [ '/', [ 'integrations', !Ref ConnectIntegration ] ]

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      RouteKey: "$disconnect"
      Target: !Join [ '/', [ 'integrations', !Ref DisconnectIntegration ] ]

  SendMessageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      RouteKey: "sendMessage"
      Target: !Join [ '/', [ 'integrations', !Ref SendMessageIntegration ] ]

  # Integrations
  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      Description: Connect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketOnConnectFunction.Arn}/invocations"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      Description: Disconnect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketOnDisconnectFunction.Arn}/invocations"

  SendMessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      Description: Send Message Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketSendMessageFunction.Arn}/invocations"

  # Deployment & Stage
  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - SendMessageRoute
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ChapterChatWebSocketApi
      DeploymentId: !Ref WebSocketDeployment
      StageName: !Ref Environment

  # ──────────────────────────────────────────────────────────────────────────
  # Chat Lambda Functions
  # ──────────────────────────────────────────────────────────────────────────
  WebSocketOnConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-ws-on-connect-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/wsOnConnect/
      Environment:
        Variables:
          WebSocketConnectionsTable: !Ref WebSocketConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable

  WebSocketOnDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-ws-on-disconnect-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/wsOnDisconnect/
      Environment:
        Variables:
          WebSocketConnectionsTable: !Ref WebSocketConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable

  WebSocketSendMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-ws-send-message-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/wsSendMessage/
      Environment:
        Variables:
          WebSocketConnectionsTable: !Ref WebSocketConnectionsTable
          ChatMessagesTable: !Ref ChatMessagesTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          CHAT_THREADS_TABLE: !Ref ChatThreadsTable
          CHAPTERS_TABLE: Chapters
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatMessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatThreadsTable
        - DynamoDBReadPolicy:
            TableName: Chapters
        - Statement:
            - Effect: Allow
              Action:
                - "execute-api:ManageConnections"
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChapterChatWebSocketApi}/${Environment}/POST/@connections/*"

  # Lambda Permissions
  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketOnConnectFunction
      Principal: apigateway.amazonaws.com

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketOnDisconnectFunction
      Principal: apigateway.amazonaws.com

  SendMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketSendMessageFunction
      Principal: apigateway.amazonaws.com

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Certificate Management
  # POST /api/certificates/issue (Chapter Head)
  # GET /api/certificates/my (Student)
  # ──────────────────────────────────────────────────────────────────────────
  CertificateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-certificates-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/certificates-payment/
      Description: Manages certificate issuance and retrieval
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CertificatesTable
        - DynamoDBReadPolicy:
            TableName: ChapterEvents
        - DynamoDBReadPolicy:
            TableName: EventPayments
        - DynamoDBCrudPolicy:
            TableName: !Ref WalletTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WalletTransactionsTable
      Events:
        IssueCertificateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/certificates/issue
            Method: POST
            Auth:
              Authorizer: CognitoAuth
        GetMyCertificatesApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/certificates/my
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        GetEventCertificatesApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/certificates/event
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        CertificateOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/certificates/{proxy+}
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Certificates

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Wallet Management
  # GET /api/wallet/balance (Student)
  # GET /api/wallet/history (Student)
  # ──────────────────────────────────────────────────────────────────────────
  WalletFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-wallet-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/wallet-management/
      Description: Manages student wallet balance and history
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WalletTable
        - DynamoDBReadPolicy:
            TableName: !Ref WalletTransactionsTable
      Events:
        GetWalletBalanceApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/wallet/balance
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        GetWalletHistoryApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/wallet/history
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        WalletOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/wallet/{proxy+}
            Method: OPTIONS
      Tags:
        Application: Unify
        Component: Wallet

  # ──────────────────────────────────────────────────────────────────────────
  # Lambda: Pay With Wallet
  # POST /api/wallet/pay (Student)
  # ──────────────────────────────────────────────────────────────────────────
  PayWithWalletFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub unify-pay-with-wallet-${Environment}
      Handler: index.handler
      CodeUri: deploy/functions/pay-with-wallet/
      Description: Handles payments using wallet points
      Timeout: 30
      Environment:
        Variables:
          WALLET_TABLE: !Ref WalletTable
          TRANSACTIONS_TABLE: !Ref WalletTransactionsTable
          CHAPTER_PAYMENTS_TABLE: !Ref ChapterPaymentsTable
          EVENT_PAYMENTS_TABLE: !Ref EventPaymentsTable
          REGISTRATION_TABLE: RegistrationRequests
          EVENT_REG_TABLE: !Ref EventRegistrationRequestsTable
          USERS_TABLE: Unify-Users
          CHAPTERS_TABLE: Chapters
          EVENTS_TABLE: !Ref ChapterEventsTable
          ACTIVITIES_TABLE: Activities
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WalletTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WalletTransactionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventPaymentsTable
        - DynamoDBCrudPolicy:
            TableName: RegistrationRequests
        - DynamoDBCrudPolicy:
            TableName: !Ref EventRegistrationRequestsTable
        - DynamoDBCrudPolicy:
            TableName: Unify-Users
        - DynamoDBCrudPolicy:
            TableName: Chapters
        - DynamoDBCrudPolicy:
            TableName: !Ref ChapterEventsTable
        - DynamoDBCrudPolicy:
            TableName: Activities
      Events:
        PayWithWalletApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PaymentHttpApi
            Path: /api/wallet/pay
            Method: POST
            Auth:
              Authorizer: CognitoAuth
      Tags:
        Application: Unify
        Component: Wallet

Outputs:
  PaymentApiUrl:
    Description: "Payment API Gateway URL — add this to VITE_PAYMENT_API_BASE_URL in .env"
    Value: !Sub "https://${PaymentHttpApi}.execute-api.ap-south-1.amazonaws.com/${Environment}"
    Export:
      Name: !Sub UnifyPaymentApiUrl-${Environment}

  ChapterPaymentsTableName:
    Description: DynamoDB table name for chapter payments
    Value: !Ref ChapterPaymentsTable
    Export:
      Name: !Sub UnifyChapterPaymentsTable-${Environment}

  ReceiptsBucketName:
    Description: S3 bucket for payment receipts
    Value: !Ref UnifyPaymentReceiptsBucket
    Export:
      Name: !Sub UnifyReceiptsBucket-${Environment}

  RazorpaySecretArn:
    Description: ARN of the Razorpay credentials secret in Secrets Manager
    Value: !Ref RazorpayCredentialsSecret
    Export:
      Name: !Sub UnifyRazorpaySecretArn-${Environment}

  CreateChapterWithPaymentFunctionArn:
    Description: ARN of the CreateChapterWithPayment Lambda
    Value: !GetAtt CreateChapterWithPaymentFunction.Arn

  CreateRazorpayOrderFunctionArn:
    Description: ARN of the CreateRazorpayOrder Lambda
    Value: !GetAtt CreateRazorpayOrderFunction.Arn

  VerifyPaymentFunctionArn:
    Description: ARN of the VerifyPayment Lambda
    Value: !GetAtt VerifyPaymentFunction.Arn

  CompletePaymentRegistrationFunctionArn:
    Description: ARN of the CompletePaymentRegistration Lambda
    Value: !GetAtt CompletePaymentRegistrationFunction.Arn

  GetChapterFeesFunctionArn:
    Description: ARN of the GetChapterFees Lambda
    Value: !GetAtt GetChapterFeesFunction.Arn

  GetPaymentDetailsFunctionArn:
    Description: ARN of the GetPaymentDetails Lambda
    Value: !GetAtt GetPaymentDetailsFunction.Arn

  ChapterChatWebSocketUrl:
    Description: "WebSocket URL for Chapter Chat — add to VITE_CHAT_WS_URL in .env"
    Value: !Sub "wss://${ChapterChatWebSocketApi}.execute-api.ap-south-1.amazonaws.com/${Environment}/"
    Export:
      Name: !Sub UnifyChatWebSocketUrl-${Environment}
